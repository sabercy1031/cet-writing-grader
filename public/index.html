<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 四六级作文评分</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 18px 80px;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #eef4ff 0%, #f7f9fc 35%, #f5f6fa 100%);
      color: #1f2937;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    .hero {
      margin-bottom: 22px;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #3157d5;
      background: #eef3ff;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
      color: #111827;
    }

    .subtitle {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
    }

    .editor-card {
      margin-top: 22px;
      padding: 22px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.04);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1.5px solid #d7dce5;
      font-size: 16px;
      line-height: 1.8;
      color: #1f2937;
      background: #fbfcfe;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    textarea:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.12);
      background: #ffffff;
    }

    .editor-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .counter {
      font-size: 14px;
      color: #6b7280;
    }

    .hint {
      font-size: 13px;
      color: #9ca3af;
    }

    .primary-btn {
      margin-top: 18px;
      padding: 13px 22px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3657da 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74, 108, 247, 0.22);
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(74, 108, 247, 0.28);
    }

    .primary-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 8px 18px rgba(74, 108, 247, 0.18);
    }

    #resultWrap {
      margin-top: 26px;
    }

    .raw-stream-box {
      padding: 20px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.9;
      min-height: 150px;
      word-break: break-word;
      color: #1f2937;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.03);
    }

    .loading {
      color: #6b7280;
    }

    .result-layout {
      display: grid;
      gap: 18px;
    }

    .score-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3157d5 100%);
      color: #fff;
      padding: 26px 24px;
      box-shadow: 0 18px 36px rgba(49, 87, 213, 0.22);
    }

    .score-card::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    .score-label {
      position: relative;
      z-index: 1;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .score-value {
      position: relative;
      z-index: 1;
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .score-desc {
      position: relative;
      z-index: 1;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.92);
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.04);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .card-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: #111827;
    }

    .good .card-icon {
      background: #ecfdf3;
      color: #16a34a;
    }

    .bad .card-icon {
      background: #fef2f2;
      color: #dc2626;
    }

    .suggest .card-icon {
      background: #fff7ed;
      color: #ea580c;
    }

    .sentence .card-icon {
      background: #eff6ff;
      color: #2563eb;
    }

    .essay-card .card-icon {
      background: #f5f3ff;
      color: #7c3aed;
    }

    .fallback .card-icon {
      background: #f3f4f6;
      color: #4b5563;
    }

    .list {
      margin: 0;
      padding-left: 22px;
      color: #374151;
      line-height: 1.95;
    }

    .list li + li {
      margin-top: 8px;
    }

    .essay-text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 2;
      color: #374151;
      word-break: break-word;
    }

    .tips-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .tip-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: #f3f6ff;
      color: #3157d5;
    }

    #scrollToBottomBtn {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: none;
      padding: 11px 16px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3657da 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74, 108, 247, 0.28);
      z-index: 999;
    }

    #scrollToBottomBtn:hover {
      filter: brightness(0.96);
    }

    @media (max-width: 760px) {
      body {
        padding: 18px 12px 72px;
      }

      .container {
        padding: 18px;
        border-radius: 18px;
      }

      h1 {
        font-size: 26px;
      }

      .grid-two {
        grid-template-columns: 1fr;
      }

      .score-value {
        font-size: 40px;
      }

      .editor-card,
      .card,
      .score-card {
        padding: 18px;
      }

      #scrollToBottomBtn {
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-badge">AI 写作批改 · 四六级作文</div>
      <h1>AI 四六级作文评分</h1>
      <p class="subtitle">
        输入你的英文作文，系统将从预测分数、优点、问题、修改建议、参考修改句与高分范文六个维度给出详细反馈。
      </p>
    </div>

    <div class="editor-card">
      <h2 class="section-title">输入作文</h2>

      <textarea id="essay" placeholder="请输入你的英文作文..."></textarea>

      <div class="editor-footer">
        <div>
          <div class="counter" id="counter">0 字</div>
          <div class="hint">建议输入较完整的作文内容，批改结果会更稳定。</div>
        </div>
      </div>

      <button id="btn" class="primary-btn">开始评分</button>
    </div>

    <div id="resultWrap">
      <div id="result"></div>
    </div>
  </div>

  <button id="scrollToBottomBtn">查看最新评分结果</button>

  <script>
    const textarea = document.getElementById("essay");
    const result = document.getElementById("result");
    const button = document.getElementById("btn");
    const counter = document.getElementById("counter");
    const scrollToBottomBtn = document.getElementById("scrollToBottomBtn");

    let autoFollow = true;
    let isStreaming = false;
    let rawResultText = "";

    function getPageHeight() {
      return Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );
    }

    function pageNearBottom() {
      return window.innerHeight + window.scrollY >= getPageHeight() - 80;
    }

    function hasResultContent() {
      return result.innerText.trim().length > 0 || result.innerHTML.trim().length > 0;
    }

    function scrollPageToBottom(force = false, smooth = false) {
      if (force || autoFollow) {
        window.scrollTo({
          top: getPageHeight(),
          behavior: smooth ? "smooth" : "auto"
        });
      }
    }

    function updateScrollButton() {
      if (!pageNearBottom() && hasResultContent()) {
        scrollToBottomBtn.style.display = "block";
      } else {
        scrollToBottomBtn.style.display = "none";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function extractSection(text, title, nextTitles) {
      const escapedTitle = title.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const nextPattern = nextTitles.length
        ? nextTitles.map(item => item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")
        : "$";

      const regex = new RegExp(
        `【${escapedTitle}】([\\s\\S]*?)(?=${nextPattern ? `【(?:${nextPattern})】` : "$"}|$)`
      );

      const match = text.match(regex);
      return match ? match[1].trim() : "";
    }

    function sectionToList(sectionText) {
      if (!sectionText) return [];

      const normalized = sectionText
        .replace(/\r/g, "")
        .replace(/^\s*[-•]\s*/gm, "1. ");

      const parts = normalized
        .split(/\n(?=\s*(?:\d+[\.、]|[-•]))/)
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => item.replace(/^\s*(\d+[\.、]|[-•])\s*/, "").trim())
        .filter(Boolean);

      if (parts.length > 0) {
        return parts;
      }

      return normalized
        .split("\n")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function parseStructuredResult(text) {
      const cleanText = text.replace(/\r/g, "").trim();

      const scoreText = extractSection(cleanText, "预测分数", ["优点", "问题", "修改建议", "参考修改句", "高分范文"]);
      const advantagesText = extractSection(cleanText, "优点", ["问题", "修改建议", "参考修改句", "高分范文"]);
      const problemsText = extractSection(cleanText, "问题", ["修改建议", "参考修改句", "高分范文"]);
      const suggestionsText = extractSection(cleanText, "修改建议", ["参考修改句", "高分范文"]);
      const revisedSentencesText = extractSection(cleanText, "参考修改句", ["高分范文"]);
      const highScoreEssayText = extractSection(cleanText, "高分范文", []);

      const scoreMatch = scoreText.match(/(\d+(?:\.\d+)?)\s*\/\s*15/);

      return {
        scoreRaw: scoreText || "",
        scoreValue: scoreMatch ? scoreMatch[1] : "",
        advantages: sectionToList(advantagesText),
        problems: sectionToList(problemsText),
        suggestions: sectionToList(suggestionsText),
        revisedSentences: sectionToList(revisedSentencesText),
        highScoreEssay: highScoreEssayText.trim()
      };
    }

    function renderList(items) {
      return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function renderFallback(rawText) {
      result.innerHTML = `
        <div class="result-layout">
          <div class="card fallback">
            <div class="card-header">
              <div class="card-icon">📄</div>
              <h3 class="card-title">批改结果</h3>
            </div>
            <pre class="essay-text">${escapeHtml(rawText)}</pre>
          </div>
        </div>
      `;
    }

    function renderStructuredResult(rawText) {
      const parsed = parseStructuredResult(rawText);

      const hasStructuredContent =
        parsed.scoreRaw ||
        parsed.advantages.length ||
        parsed.problems.length ||
        parsed.suggestions.length ||
        parsed.revisedSentences.length ||
        parsed.highScoreEssay;

      if (!hasStructuredContent) {
        renderFallback(rawText);
        return;
      }

      const scoreDisplay = parsed.scoreValue
        ? `${escapeHtml(parsed.scoreValue)} / 15`
        : escapeHtml(parsed.scoreRaw || "未识别");

      const scoreDesc = parsed.scoreValue
        ? "这是 AI 结合四六级评分标准给出的预测分数，可作为你本次作文水平的直观参考。"
        : "本次结果未能完整解析出分数字段，但原始批改内容仍已保留。";

      result.innerHTML = `
        <div class="result-layout">
          <div class="score-card">
            <div class="score-label">🎯 预测分数</div>
            <div class="score-value">${scoreDisplay}</div>
            <div class="score-desc">${scoreDesc}</div>
            <div class="tips-bar">
              <span class="tip-chip">结构化批改</span>
              <span class="tip-chip">参考修改句</span>
              <span class="tip-chip">高分范文</span>
            </div>
          </div>

          <div class="grid-two">
            <div class="card good">
              <div class="card-header">
                <div class="card-icon">✅</div>
                <h3 class="card-title">优点</h3>
              </div>
              ${
                parsed.advantages.length
                  ? `<ol class="list">${renderList(parsed.advantages)}</ol>`
                  : `<p class="essay-text">本次未解析到该部分内容。</p>`
              }
            </div>

            <div class="card bad">
              <div class="card-header">
                <div class="card-icon">❌</div>
                <h3 class="card-title">问题</h3>
              </div>
              ${
                parsed.problems.length
                  ? `<ol class="list">${renderList(parsed.problems)}</ol>`
                  : `<p class="essay-text">本次未解析到该部分内容。</p>`
              }
            </div>
          </div>

          <div class="card suggest">
            <div class="card-header">
              <div class="card-icon">💡</div>
              <h3 class="card-title">修改建议</h3>
            </div>
            ${
              parsed.suggestions.length
                ? `<ol class="list">${renderList(parsed.suggestions)}</ol>`
                : `<p class="essay-text">本次未解析到该部分内容。</p>`
            }
          </div>

          <div class="card sentence">
            <div class="card-header">
              <div class="card-icon">✏️</div>
              <h3 class="card-title">参考修改句</h3>
            </div>
            ${
              parsed.revisedSentences.length
                ? `<ol class="list">${renderList(parsed.revisedSentences)}</ol>`
                : `<p class="essay-text">本次未解析到该部分内容。</p>`
            }
          </div>

          <div class="card essay-card">
            <div class="card-header">
              <div class="card-icon">📘</div>
              <h3 class="card-title">高分范文</h3>
            </div>
            ${
              parsed.highScoreEssay
                ? `<p class="essay-text">${escapeHtml(parsed.highScoreEssay)}</p>`
                : `<p class="essay-text">本次未解析到高分范文。</p>`
            }
          </div>
        </div>
      `;
    }

    textarea.addEventListener("input", () => {
      counter.innerText = textarea.value.length + " 字";
    });

    window.addEventListener("scroll", () => {
      autoFollow = pageNearBottom();
      updateScrollButton();
    });

    scrollToBottomBtn.addEventListener("click", () => {
      autoFollow = true;
      scrollPageToBottom(true, true);
      updateScrollButton();
    });

    button.onclick = async () => {
      const essay = textarea.value.trim();

      if (essay.length < 20) {
        alert("作文太短了");
        return;
      }

      button.disabled = true;
      button.innerText = "AI评分中...";
      rawResultText = "";
      result.innerHTML = `<div class="raw-stream-box"><span class="loading">AI正在评分，请稍等...</span></div>`;

      autoFollow = true;
      isStreaming = true;
      updateScrollButton();
      scrollPageToBottom(true, false);

      try {
        const response = await fetch("/score", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ essay })
        });

        if (!response.ok) {
          const errText = await response.text();
          result.innerHTML = `<div class="raw-stream-box">${escapeHtml(errText || "请求失败，请检查服务器")}</div>`;
          isStreaming = false;
          autoFollow = pageNearBottom();
          updateScrollButton();
          button.disabled = false;
          button.innerText = "重新评分";
          return;
        }

        if (!response.body) {
          result.innerHTML = `<div class="raw-stream-box">请求失败，服务器未返回可读取内容</div>`;
          isStreaming = false;
          autoFollow = pageNearBottom();
          updateScrollButton();
          button.disabled = false;
          button.innerText = "重新评分";
          return;
        }

        result.innerHTML = `<div class="raw-stream-box" id="rawStreamBox"></div>`;
        const rawStreamBox = document.getElementById("rawStreamBox");
        scrollPageToBottom(true, false);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const text = decoder.decode(value, { stream: true });
          rawResultText += text;
          rawStreamBox.innerText = rawResultText;

          scrollPageToBottom(false, false);
          updateScrollButton();
        }

        renderStructuredResult(rawResultText);
        scrollPageToBottom(false, false);
      } catch (e) {
        result.innerHTML = `<div class="raw-stream-box">请求失败，请检查服务器</div>`;
      }

      isStreaming = false;
      autoFollow = pageNearBottom();
      updateScrollButton();

      button.disabled = false;
      button.innerText = "重新评分";
    };
  </script>
</body>
</html>
