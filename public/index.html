<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 四六级作文评分</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 32px 18px 80px;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #eef4ff 0%, #f7f9fc 35%, #f5f6fa 100%);
      color: #1f2937;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    .hero {
      margin-bottom: 22px;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #3157d5;
      background: #eef3ff;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
      color: #111827;
    }

    .subtitle {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
    }

    .feature-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .feature-chip {
      border: 1px solid #d9e3ff;
      background: #eef3ff;
      color: #3157d5;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .feature-chip:hover {
      background: #dfe8ff;
      border-color: #c8d8ff;
      transform: translateY(-1px);
    }

    .feature-chip.card-chip {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.22);
      color: #fff;
      backdrop-filter: blur(4px);
    }

    .feature-chip.card-chip:hover {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .editor-card {
      margin-top: 22px;
      padding: 22px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.04);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .ocr-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .ocr-file {
      max-width: 280px;
      font-size: 14px;
    }

    .ocr-status {
      font-size: 13px;
      color: #6b7280;
      margin: 4px 0 12px;
      line-height: 1.6;
    }

    .ocr-status.success {
      color: #15803d;
    }

    .ocr-status.error {
      color: #dc2626;
    }

    .ocr-status.warning {
      color: #b45309;
      font-weight: 600;
    }

    .system-note {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 13px;
      line-height: 1.7;
      color: #6b7280;
    }

    .system-note strong {
      color: #374151;
    }

    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1.5px solid #d7dce5;
      font-size: 16px;
      line-height: 1.8;
      color: #1f2937;
      background: #fbfcfe;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    textarea:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.12);
      background: #ffffff;
    }

    .editor-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .counter-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .counter {
      font-size: 14px;
      color: #4b5563;
      font-weight: 600;
    }

    .hint {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .primary-btn {
      margin-top: 18px;
      padding: 13px 22px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3657da 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74, 108, 247, 0.22);
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(74, 108, 247, 0.28);
    }

    .primary-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 8px 18px rgba(74, 108, 247, 0.18);
    }

    #resultWrap {
      margin-top: 26px;
    }

    .raw-stream-box {
      padding: 20px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.9;
      min-height: 150px;
      word-break: break-word;
      color: #1f2937;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.03);
    }

    .loading {
      color: #6b7280;
    }

    .result-layout {
      display: grid;
      gap: 18px;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .secondary-btn {
      border: 1px solid #dbe2f0;
      background: #ffffff;
      color: #3157d5;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
      transition: all 0.2s ease;
    }

    .secondary-btn:hover {
      background: #f7faff;
      border-color: #c9d6ff;
    }

    .secondary-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .score-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3157d5 100%);
      color: #fff;
      padding: 26px 24px;
      box-shadow: 0 18px 36px rgba(49, 87, 213, 0.22);
      border: none;
      scroll-margin-top: 20px;
    }

    .score-card::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    .score-card .secondary-btn {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.22);
      color: #fff;
      box-shadow: none;
    }

    .score-card .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .score-label {
      position: relative;
      z-index: 1;
      font-size: 14px;
      opacity: 0.92;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .score-value {
      position: relative;
      z-index: 1;
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -1px;
      color: #fff;
    }

    .score-meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .score-desc {
      position: relative;
      z-index: 1;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.94);
      margin-bottom: 14px;
    }

    .card-nav {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.04);
      scroll-margin-top: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: #111827;
    }

    .good .card-icon {
      background: #ecfdf3;
      color: #16a34a;
    }

    .bad .card-icon {
      background: #fef2f2;
      color: #dc2626;
    }

    .suggest .card-icon {
      background: #fff7ed;
      color: #ea580c;
    }

    .sentence .card-icon {
      background: #eff6ff;
      color: #2563eb;
    }

    .essay-card .card-icon {
      background: #f5f3ff;
      color: #7c3aed;
    }

    .fallback .card-icon {
      background: #f3f4f6;
      color: #4b5563;
    }

    .list {
      margin: 0;
      padding-left: 22px;
      color: #374151;
      line-height: 1.95;
    }

    .list li + li {
      margin-top: 8px;
    }

    .essay-text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 2;
      color: #374151;
      word-break: break-word;
    }

    .essay-preview {
      position: relative;
      overflow: hidden;
      max-height: none;
      transition: max-height 0.3s ease;
    }

    .essay-preview.collapsed {
      max-height: 230px;
    }

    .essay-preview.collapsed::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 80px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1));
      pointer-events: none;
    }

    .toggle-btn {
      border: none;
      background: #f3f6ff;
      color: #3157d5;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle-btn:hover {
      background: #e8efff;
    }

    #scrollToBottomBtn {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: none;
      padding: 11px 16px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #4a6cf7 0%, #3657da 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74, 108, 247, 0.28);
      z-index: 999;
    }

    #scrollToBottomBtn:hover {
      filter: brightness(0.96);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      padding: 11px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 1001;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 760px) {
      body {
        padding: 18px 12px 72px;
      }

      .container {
        padding: 18px;
        border-radius: 18px;
      }

      h1 {
        font-size: 26px;
      }

      .grid-two {
        grid-template-columns: 1fr;
      }

      .score-value {
        font-size: 40px;
      }

      .editor-card,
      .card,
      .score-card {
        padding: 18px;
      }

      .ocr-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .ocr-file {
        max-width: 100%;
      }

      #scrollToBottomBtn {
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-badge">AI 写作批改 · 四六级作文</div>
      <h1>AI 四六级作文评分</h1>
      <p class="subtitle">输入你的英文作文，获取 AI 的结构化评分、修改建议与高分改写。</p>

      <div class="feature-nav">
        <button class="feature-chip" data-target="scoreSection">预测分数</button>
        <button class="feature-chip" data-target="advantagesSection">优点</button>
        <button class="feature-chip" data-target="problemsSection">问题</button>
        <button class="feature-chip" data-target="suggestionsSection">修改建议</button>
        <button class="feature-chip" data-target="sentencesSection">参考修改句</button>
        <button class="feature-chip" data-target="essaySection">高分范文</button>
      </div>
    </div>

    <div class="editor-card">
      <h2 class="section-title">输入作文</h2>

      <div class="ocr-toolbar">
        <input id="imageUpload" class="ocr-file" type="file" accept="image/*" />
        <button id="ocrBtn" class="secondary-btn" type="button">图片识别</button>
      </div>

      <div id="ocrStatus" class="ocr-status">
        建议：请尽量正面拍摄、光线充足、字迹清晰。识别结果会先填入文本框，你可以手动检查后再评分。
      </div>

      <textarea id="essay" placeholder="请输入你的英文作文..."></textarea>

      <div class="system-note">
        <strong>说明：</strong>如果你使用了图片识别，建议先检查识别结果再评分。系统评分前可能会做轻微格式整理，例如补空格、处理断行和标点间距，但不会替你纠正语法、拼写或润色表达。
      </div>

      <div class="editor-footer">
        <div class="counter-wrap">
          <div class="counter" id="counter">当前词数：0</div>
          <div class="hint">建议词数：四级 120–180 词 / 六级 150–220 词。输入越完整，批改结果通常越稳定。</div>
        </div>
      </div>

      <button id="btn" class="primary-btn">开始评分</button>
    </div>

    <div id="resultWrap">
      <div id="result"></div>
    </div>
  </div>

  <button id="scrollToBottomBtn">查看最新评分结果</button>
  <div id="toast" class="toast"></div>

  <script>
    const textarea = document.getElementById("essay");
    const result = document.getElementById("result");
    const button = document.getElementById("btn");
    const counter = document.getElementById("counter");
    const scrollToBottomBtn = document.getElementById("scrollToBottomBtn");
    const toast = document.getElementById("toast");
    const imageUpload = document.getElementById("imageUpload");
    const ocrBtn = document.getElementById("ocrBtn");
    const ocrStatus = document.getElementById("ocrStatus");

    let autoFollow = true;
    let isStreaming = false;
    let isLoading = false;
    let hasSuccess = false;
    let rawResultText = "";
    let isEssayExpanded = false;
    let sectionCopyMap = {};
    let hasStructuredResult = false;
    let isOcrLoading = false;
    let ocrNeedsReview = false;
    let isApplyingOcrResult = false;

    function getPageHeight() {
      return Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );
    }

    function pageNearBottom() {
      return window.innerHeight + window.scrollY >= getPageHeight() - 80;
    }

    function hasResultContent() {
      return result.innerText.trim().length > 0 || result.innerHTML.trim().length > 0;
    }

    function scrollPageToBottom(force = false, smooth = false) {
      if (force || autoFollow) {
        window.scrollTo({
          top: getPageHeight(),
          behavior: smooth ? "smooth" : "auto"
        });
      }
    }

    function updateScrollButton() {
      if (!pageNearBottom() && hasResultContent()) {
        scrollToBottomBtn.style.display = "block";
      } else {
        scrollToBottomBtn.style.display = "none";
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function countWords(text) {
      const trimmed = text.trim();
      if (!trimmed) return 0;
      return trimmed.split(/\s+/).filter(Boolean).length;
    }

    function updateWordCounter() {
      const wordCount = countWords(textarea.value);
      counter.innerText = `当前词数：${wordCount}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function extractSection(text, title, nextTitles) {
      const escapedTitle = title.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const nextPattern = nextTitles.length
        ? nextTitles.map(item => item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")
        : "";

      const regex = new RegExp(
        `【${escapedTitle}】([\\s\\S]*?)(?=${nextPattern ? `【(?:${nextPattern})】` : "$"}|$)`
      );

      const match = text.match(regex);
      return match ? match[1].trim() : "";
    }

    function sectionToList(sectionText) {
      if (!sectionText) return [];

      const normalized = sectionText
        .replace(/\r/g, "")
        .replace(/^\s*[-•]\s*/gm, "1. ");

      const parts = normalized
        .split(/\n(?=\s*(?:\d+[\.、]|[-•]))/)
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => item.replace(/^\s*(\d+[\.、]|[-•])\s*/, "").trim())
        .filter(Boolean);

      if (parts.length > 0) {
        return parts;
      }

      return normalized
        .split("\n")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function getLevelInfo(score) {
      if (score >= 13) return { level: "优秀水平", surpass: 90 };
      if (score >= 11) return { level: "良好水平", surpass: 75 };
      if (score >= 9) return { level: "中上水平", surpass: 60 };
      if (score >= 7) return { level: "中等水平", surpass: 45 };
      if (score >= 5) return { level: "基础水平", surpass: 30 };
      return { level: "仍需提升", surpass: 15 };
    }

    function parseStructuredResult(text) {
      const cleanText = text.replace(/\r/g, "").trim();

      const scoreText = extractSection(cleanText, "预测分数", ["优点", "问题", "修改建议", "参考修改句", "高分范文"]);
      const advantagesText = extractSection(cleanText, "优点", ["问题", "修改建议", "参考修改句", "高分范文"]);
      const problemsText = extractSection(cleanText, "问题", ["修改建议", "参考修改句", "高分范文"]);
      const suggestionsText = extractSection(cleanText, "修改建议", ["参考修改句", "高分范文"]);
      const revisedSentencesText = extractSection(cleanText, "参考修改句", ["高分范文"]);
      const highScoreEssayText = extractSection(cleanText, "高分范文", []);

      const scoreMatch = scoreText.match(/(\d+(?:\.\d+)?)\s*\/\s*15/);
      const scoreNumber = scoreMatch ? Number(scoreMatch[1]) : null;
      const levelInfo = scoreNumber !== null ? getLevelInfo(scoreNumber) : null;

      return {
        scoreRaw: scoreText || "",
        scoreValue: scoreMatch ? scoreMatch[1] : "",
        scoreNumber,
        level: levelInfo ? levelInfo.level : "",
        surpass: levelInfo ? levelInfo.surpass : "",
        advantages: sectionToList(advantagesText),
        problems: sectionToList(problemsText),
        suggestions: sectionToList(suggestionsText),
        revisedSentences: sectionToList(revisedSentencesText),
        highScoreEssay: highScoreEssayText.trim()
      };
    }

    function renderList(items) {
      return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function listToText(title, items) {
      if (!items || !items.length) return `${title}\n暂无内容`;
      return `${title}\n` + items.map((item, index) => `${index + 1}. ${item}`).join("\n");
    }

    function setupSectionCopyMap(parsed, rawText) {
      const scoreText = parsed.scoreValue
        ? `预测分数\n${parsed.scoreValue} / 15\n评价等级：${parsed.level}\n估算超越：${parsed.surpass}% 的考生`
        : `预测分数\n${parsed.scoreRaw || "未识别"}`;

      sectionCopyMap = {
        copyFull: rawText,
        copyScore: scoreText,
        copyAdvantages: listToText("优点", parsed.advantages),
        copyProblems: listToText("问题", parsed.problems),
        copySuggestions: listToText("修改建议", parsed.suggestions),
        copySentences: listToText("参考修改句", parsed.revisedSentences),
        copyEssay: parsed.highScoreEssay ? `高分范文\n${parsed.highScoreEssay}` : "高分范文\n暂无内容"
      };
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("复制成功");
      } catch (error) {
        showToast("复制失败，请稍后重试");
      }
    }

    function jumpToSection(targetId) {
      if (!hasStructuredResult) return;
      const el = document.getElementById(targetId);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function bindJumpButtons() {
      document.querySelectorAll("[data-target]").forEach(btn => {
        btn.onclick = () => jumpToSection(btn.dataset.target);
      });
    }

    function bindCopyButtons() {
      document.querySelectorAll("[data-copy-key]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.dataset.copyKey;
          copyText(sectionCopyMap[key] || "");
        };
      });
    }

    function bindEssayToggle(canToggle) {
      if (!canToggle) return;
      const toggleEssayBtn = document.getElementById("toggleEssayBtn");
      const essayPreview = document.getElementById("essayPreview");
      if (!toggleEssayBtn || !essayPreview) return;

      toggleEssayBtn.onclick = () => {
        isEssayExpanded = !isEssayExpanded;
        if (isEssayExpanded) {
          essayPreview.classList.remove("collapsed");
          toggleEssayBtn.textContent = "收起范文";
        } else {
          essayPreview.classList.add("collapsed");
          toggleEssayBtn.textContent = "展开全文";
        }
      };
    }

    function renderFallback(rawText) {
      hasStructuredResult = false;
      sectionCopyMap = { copyFull: rawText };

      result.innerHTML = `
        <div class="result-layout">
          <div class="top-actions">
            <button class="secondary-btn" data-copy-key="copyFull">复制全部批改结果</button>
          </div>
          <div class="card fallback">
            <div class="card-header">
              <div class="card-header-left">
                <div class="card-icon">📄</div>
                <h3 class="card-title">批改结果</h3>
              </div>
            </div>
            <pre class="essay-text">${escapeHtml(rawText)}</pre>
          </div>
        </div>
      `;
      bindCopyButtons();
    }

    function renderStructuredResult(rawText) {
      const parsed = parseStructuredResult(rawText);

      const ok =
        parsed.scoreRaw ||
        parsed.advantages.length ||
        parsed.problems.length ||
        parsed.suggestions.length ||
        parsed.revisedSentences.length ||
        parsed.highScoreEssay;

      if (!ok) {
        renderFallback(rawText);
        return;
      }

      hasStructuredResult = true;
      setupSectionCopyMap(parsed, rawText);

      const scoreDisplay = parsed.scoreValue
        ? `${escapeHtml(parsed.scoreValue)} / 15`
        : escapeHtml(parsed.scoreRaw || "未识别");

      const scoreDesc = parsed.scoreValue
        ? "这是 AI 结合四六级评分标准给出的预测分数，可作为你本次作文水平的直观参考。超越百分比为体验化估算值，用于增强反馈感。"
        : "本次结果未能完整解析出分数字段，但原始批改内容仍已保留。";

      const essayIsLong = parsed.highScoreEssay && parsed.highScoreEssay.length > 320;

      result.innerHTML = `
        <div class="result-layout">
          <div class="top-actions">
            <button class="secondary-btn" data-copy-key="copyFull">复制全部批改结果</button>
          </div>

          <div class="score-card" id="scoreSection">
            <div class="card-header">
              <div class="card-header-left">
                <div class="card-icon" style="background: rgba(255,255,255,0.16); color: #fff;">🎯</div>
                <h3 class="card-title" style="color:#fff;">预测分数</h3>
              </div>
              <button class="secondary-btn" data-copy-key="copyScore">复制本区</button>
            </div>

            <div class="score-value">${scoreDisplay}</div>

            ${
              parsed.scoreValue
                ? `
                  <div class="score-meta">
                    <span class="score-pill">评价等级：${escapeHtml(parsed.level)}</span>
                    <span class="score-pill">估算超越：${escapeHtml(String(parsed.surpass))}% 的考生</span>
                  </div>
                `
                : ""
            }

            <div class="score-desc">${scoreDesc}</div>

            <div class="card-nav">
              <button class="feature-chip card-chip" data-target="scoreSection">预测分数</button>
              <button class="feature-chip card-chip" data-target="advantagesSection">优点</button>
              <button class="feature-chip card-chip" data-target="problemsSection">问题</button>
              <button class="feature-chip card-chip" data-target="suggestionsSection">修改建议</button>
              <button class="feature-chip card-chip" data-target="sentencesSection">参考修改句</button>
              <button class="feature-chip card-chip" data-target="essaySection">高分范文</button>
            </div>
          </div>

          <div class="grid-two">
            <div class="card good" id="advantagesSection">
              <div class="card-header">
                <div class="card-header-left">
                  <div class="card-icon">✅</div>
                  <h3 class="card-title">优点</h3>
                </div>
                <button class="secondary-btn" data-copy-key="copyAdvantages">复制本区</button>
              </div>
              ${
                parsed.advantages.length
                  ? `<ol class="list">${renderList(parsed.advantages)}</ol>`
                  : `<p class="essay-text">本次未解析到该部分内容。</p>`
              }
            </div>

            <div class="card bad" id="problemsSection">
              <div class="card-header">
                <div class="card-header-left">
                  <div class="card-icon">❌</div>
                  <h3 class="card-title">问题</h3>
                </div>
                <button class="secondary-btn" data-copy-key="copyProblems">复制本区</button>
              </div>
              ${
                parsed.problems.length
                  ? `<ol class="list">${renderList(parsed.problems)}</ol>`
                  : `<p class="essay-text">本次未解析到该部分内容。</p>`
              }
            </div>
          </div>

          <div class="card suggest" id="suggestionsSection">
            <div class="card-header">
              <div class="card-header-left">
                <div class="card-icon">💡</div>
                <h3 class="card-title">修改建议</h3>
              </div>
              <button class="secondary-btn" data-copy-key="copySuggestions">复制本区</button>
            </div>
            ${
              parsed.suggestions.length
                ? `<ol class="list">${renderList(parsed.suggestions)}</ol>`
                : `<p class="essay-text">本次未解析到该部分内容。</p>`
            }
          </div>

          <div class="card sentence" id="sentencesSection">
            <div class="card-header">
              <div class="card-header-left">
                <div class="card-icon">✏️</div>
                <h3 class="card-title">参考修改句</h3>
              </div>
              <button class="secondary-btn" data-copy-key="copySentences">复制本区</button>
            </div>
            ${
              parsed.revisedSentences.length
                ? `<ol class="list">${renderList(parsed.revisedSentences)}</ol>`
                : `<p class="essay-text">本次未解析到该部分内容。</p>`
            }
          </div>

          <div class="card essay-card" id="essaySection">
            <div class="card-header">
              <div class="card-header-left">
                <div class="card-icon">📘</div>
                <h3 class="card-title">高分范文</h3>
              </div>
              <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="secondary-btn" data-copy-key="copyEssay">复制本区</button>
                ${
                  essayIsLong
                    ? `<button class="toggle-btn" id="toggleEssayBtn">${isEssayExpanded ? "收起范文" : "展开全文"}</button>`
                    : ""
                }
              </div>
            </div>
            ${
              parsed.highScoreEssay
                ? `
                  <div class="essay-preview ${essayIsLong && !isEssayExpanded ? "collapsed" : ""}" id="essayPreview">
                    <p class="essay-text">${escapeHtml(parsed.highScoreEssay)}</p>
                  </div>
                `
                : `<p class="essay-text">本次未解析到高分范文。</p>`
            }
          </div>
        </div>
      `;

      bindJumpButtons();
      bindCopyButtons();
      bindEssayToggle(essayIsLong);
    }

    function setOcrStatus(message, type = "") {
      ocrStatus.textContent = message;
      ocrStatus.className = `ocr-status${type ? " " + type : ""}`;
    }

    textarea.addEventListener("input", () => {
      updateWordCounter();

      if (isApplyingOcrResult) return;

      if (ocrNeedsReview) {
        ocrNeedsReview = false;
        setOcrStatus("你已手动检查或修改文本，现在可以开始评分。", "success");
      }
    });

    window.addEventListener("scroll", () => {
      autoFollow = pageNearBottom();
      updateScrollButton();
    });

    scrollToBottomBtn.addEventListener("click", () => {
      autoFollow = true;
      scrollPageToBottom(true, true);
      updateScrollButton();
    });

    ocrBtn.onclick = async () => {
      if (isOcrLoading || isLoading) return;

      const file = imageUpload.files[0];
      if (!file) {
        alert("请先选择图片");
        return;
      }

      if (!file.type.startsWith("image/")) {
        alert("请选择图片文件");
        return;
      }

      if (file.size > 8 * 1024 * 1024) {
        alert("图片不能超过 8MB");
        return;
      }

      isOcrLoading = true;
      ocrBtn.disabled = true;
      ocrBtn.textContent = "识别中...";

      setOcrStatus("正在识别图片，请稍等...", "");

      try {
        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch("/ocr", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "图片识别失败");
        }

        const recognizedText = (data.text || "").trim();

        if (!recognizedText) {
          setOcrStatus(data.warning || "未识别到清晰文字，请换一张更清晰的照片再试。", "error");
          return;
        }

        isApplyingOcrResult = true;

        if (textarea.value.trim()) {
          const shouldAppend = confirm("文本框里已经有内容了。点击“确定”会把识别结果追加到现有内容后面；点击“取消”则不导入。");
          if (!shouldAppend) {
            isApplyingOcrResult = false;
            setOcrStatus("已取消导入识别结果。", "");
            return;
          }
          textarea.value = `${textarea.value.trim()}\n${recognizedText}`;
        } else {
          textarea.value = recognizedText;
        }

        updateWordCounter();
        ocrNeedsReview = true;
        setOcrStatus("图片识别完成。请先检查并修改识别结果，再开始评分。", "warning");
        showToast("识别成功");
      } catch (error) {
        setOcrStatus(error.message || "图片识别失败，请换一张更清晰的照片再试。", "error");
      } finally {
        isApplyingOcrResult = false;
        isOcrLoading = false;
        ocrBtn.disabled = false;
        ocrBtn.textContent = "图片识别";
      }
    };

    bindJumpButtons();
    updateWordCounter();

    button.onclick = async () => {
      if (isLoading || isOcrLoading) return;

      const essay = textarea.value.trim();
      const wordCount = countWords(essay);

      if (wordCount < 30) {
        alert("作文词数过少，请至少输入 30 个词后再评分。");
        return;
      }

      if (ocrNeedsReview) {
        const continueAfterOcr = confirm(
          "⚠️ 检测到你刚使用了图片识别。\n\n建议先检查并修改识别结果，再开始评分，否则 OCR 错词可能影响分数准确性。\n\n点击“确定”继续评分，点击“取消”返回检查文本。"
        );

        if (!continueAfterOcr) {
          return;
        }
      }

      const confirmScore = confirm(
        `开始评分前，请确认：\n\n` +
        `1. 这已经是你准备提交的版本\n` +
        `2. 你已检查明显拼写或识别错误\n` +
        `3. 当前词数：${wordCount} 词\n\n` +
        `说明：系统评分前可能会做轻微格式整理，但不会替你纠正语法、拼写或润色表达。\n\n` +
        `确认开始评分吗？`
      );

      if (!confirmScore) {
        return;
      }

      isLoading = true;
      hasSuccess = false;
      isStreaming = true;

      button.disabled = true;
      button.innerText = "AI评分中...";
      rawResultText = "";
      isEssayExpanded = false;
      hasStructuredResult = false;
      sectionCopyMap = {};
      result.innerHTML = `<div class="raw-stream-box"><span class="loading">AI正在评分，请稍等...</span></div>`;

      autoFollow = true;
      updateScrollButton();
      scrollPageToBottom(true, false);

      try {
        const response = await fetch("/score", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ essay })
        });

        if (!response.ok) {
          const errText = await response.text();
          result.innerHTML = `<div class="raw-stream-box">${escapeHtml(errText || "请求失败，请检查服务器")}</div>`;
          return;
        }

        if (!response.body) {
          result.innerHTML = `<div class="raw-stream-box">请求失败，服务器未返回可读取内容</div>`;
          return;
        }

        result.innerHTML = `<div class="raw-stream-box" id="rawStreamBox"></div>`;
        const rawStreamBox = document.getElementById("rawStreamBox");
        scrollPageToBottom(true, false);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const text = decoder.decode(value, { stream: true });
          if (text) {
            rawResultText += text;
            rawStreamBox.innerText = rawResultText;
            scrollPageToBottom(false, false);
            updateScrollButton();
          }
        }

        if (rawResultText.trim()) {
          renderStructuredResult(rawResultText);
          hasSuccess = true;
          ocrNeedsReview = false;
          scrollPageToBottom(false, false);
        } else {
          result.innerHTML = `<div class="raw-stream-box">请求失败，请检查服务器</div>`;
        }
      } catch (e) {
        if (!hasSuccess && !rawResultText.trim()) {
          result.innerHTML = `<div class="raw-stream-box">请求失败，请检查服务器</div>`;
        }
      } finally {
        isStreaming = false;
        autoFollow = pageNearBottom();
        updateScrollButton();
        button.disabled = false;
        button.innerText = "重新评分";
        isLoading = false;
      }
    };
  </script>
</body>
</html>
